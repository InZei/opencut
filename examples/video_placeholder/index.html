<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }
        .overlay {
            position: absolute;
            top: 100px;
            left: 100px;
            font-size: 60px;
            color: white;
            z-index: 10;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            opacity: 0;
        }
        .info-box {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 10px;
            color: white;
            font-size: 24px;
            font-family: monospace;
            z-index: 10;
        }
        /* Video 占位符：透明区域，供后续 OpenCV 填充 */
        .opencut-video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            z-index: -1;
            /* 开发阶段可加背景色调试 */
            /* background: rgba(255, 0, 0, 0.1); */
        }
    </style>
</head>
<body>
    <!-- Video 占位符，data-id 与 Python 绑定 -->
    <div class="opencut-video-placeholder" data-id="main_video"></div>
    
    <div class="overlay" id="overlay">Video Overlay Text</div>
    
    <div class="info-box">
        Video Placeholder Demo<br>
        <span style="font-size: 16px; color: #9ca3af;">(MVP 阶段仅提取占位符坐标)</span>
    </div>

    <script>
        window.renderFrame = function(frame) {
            const overlay = document.getElementById('overlay');
            
            // 淡入效果（前 60 帧）
            const opacity = Math.min(1, frame / 60);
            overlay.style.opacity = opacity;
            
            // 轻微浮动效果
            const yOffset = Math.sin(frame * 0.1) * 10;
            overlay.style.transform = `translateY(${yOffset}px)`;
        }
    </script>
</body>
</html>
